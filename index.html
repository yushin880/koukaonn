<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>フリー素材配布</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #f5f5f7; display: flex; flex-direction: column; align-items: center; padding: 50px; }
        h1 { color: #1d1d1f; margin-bottom: 30px; }
        .container { width: 100%; max-width: 500px; display: flex; flex-direction: column; gap: 20px; }
        .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); display: flex; align-items: center; justify-content: space-between; }
        .name { font-weight: bold; font-size: 1.1em; color: #333; flex: 1; }
        .dl-btn { background: #007aff; color: white; text-decoration: none; padding: 10px 20px; border-radius: 20px; font-weight: bold; margin-left: 10px; }
        audio { width: 150px; }
    </style>
</head>
<body>

    <h1>素材ライブラリ</h1>

    <div class="container">
        <!-- 1つ目：水の音 -->
        <div class="card">
            <div class="name">水の音【寝るとき用】</div>
            <audio controls src="https://github.com/yushin880/koukaonn/releases/download/v1.0/1.mp3"></audio>
            <a href="https://github.com/yushin880/koukaonn/releases/download/v1.0/1.mp3" download class="dl-btn">DL</a>
        </div>

        <!-- 2つ目：朝の音（ここを追加！） -->
        <div class="card">
            <div class="name">朝の音</div>
            <audio controls src="https://github.com/yushin880/koukaonn/releases/download/v1.0/2.mp3"></audio>
            <a href="https://github.com/yushin880/koukaonn/releases/download/v1.0/2.mp3" download class="dl-btn">DL</a>
        </div>
    </div>

</body>
</html>
